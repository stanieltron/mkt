[profile.default]
src = "src"
test = "test"
libs = ["../foundry/lib", "../node_modules"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
fuzz = { runs = 2048 }
invariant = { runs = 256, depth = 64, fail_on_revert = false }
fs_permissions = [{ access = "read-write", path = "./deployments" }]
