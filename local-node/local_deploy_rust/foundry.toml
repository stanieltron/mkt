[profile.default]
src = "../solidity/src"
script = "script"
test = "test"
libs = ["../foundry/lib", "../node_modules"]
auto_detect_solc = true
optimizer = true
optimizer_runs = 200
via_ir = true
fuzz = { runs = 1024 }
invariant = { runs = 128, depth = 32, fail_on_revert = false }
remappings = [
  "forge-std/=../foundry/lib/forge-std/src/",
  "@uniswap/v3-core/=../foundry/lib/v3-core/",
  "@uniswap/v3-periphery/=../foundry/lib/v3-periphery/",
  "@uniswap/lib/=../foundry/lib/solidity-lib/",
  "solidity/src/=../solidity/src/"
]
allow_paths = ["../solidity"]
fs_permissions = [{ access = "read-write", path = "./deployments" }, { access = "read", path = "../solidity" }]
